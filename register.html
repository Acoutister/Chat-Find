<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - 肥波的淤青</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
        }
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            margin: 20px;
        }
        .auth-title {
            text-align: center;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-control {
            padding: 14px 20px;
            border-radius: 12px;
            background: #f1f5f9;
            border: 1px solid transparent;
            margin-bottom: 16px;
        }
        .form-control:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            margin-top: 10px;
        }
        .auth-btn:hover { background: var(--primary-dark); }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
        }
        .switch-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
        }
        .switch-link span { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-title">加入淤青</div>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" class="form-control" placeholder="输入用户名" required>
        <input type="password" name="password" class="form-control" placeholder="设置登录密码" required>

        <input type="text" name="invitation_code" class="form-control" placeholder="输入专署邀请码" required>

        <button type="submit" class="auth-btn">立即注册</button>
    </form>

    <a href="/login" class="switch-link">已经有账号了？ <span>去登录</span></a>
</div>

</body>
</html>
