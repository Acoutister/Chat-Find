<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 肥波的淤青</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            margin: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-title {
            text-align: center;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 28px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-muted, #64748b);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-control {
            padding: 14px 20px;
            border-radius: 12px;
            background: #f1f5f9;
            border: 1px solid transparent;
            margin-bottom: 16px;
            font-size: 15px;
            transition: all 0.2s;
        }

        .form-control:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .auth-btn:active {
            transform: translateY(1px);
        }

        .error-msg {
            background: #fef2f2;
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #fca5a5;
        }

        .switch-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .switch-link:hover {
            opacity: 0.8;
        }

        .switch-link span {
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-title">欢迎回来</div>
    <div class="auth-subtitle">登录 肥波的淤青，发现有趣的灵魂</div>

    {% if error %}
        <div class="error-msg"><i class="bi bi-exclamation-circle-fill" style="margin-right: 5px;"></i>{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" class="form-control" placeholder="用户名" required autocomplete="username">
        <input type="password" name="password" class="form-control" placeholder="登录密码" required autocomplete="current-password">

        <button type="submit" class="auth-btn">登 录</button>
    </form>

    <a href="/register" class="switch-link">还没有账号？ <span>立即注册</span></a>
</div>

</body>
</html>
